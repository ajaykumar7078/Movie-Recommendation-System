version: '3.8'

services:
  api:
    build: .
    container_name: movie-recommender-api
    ports:
      - "5000:5000"
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 api.app:app
    restart: unless-stopped

  streamlit:
    build: .
    container_name: movie-recommender-streamlit
    ports:
      - "8501:8501"
    command: streamlit run streamlit/app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - api
    restart: unless-stopped
